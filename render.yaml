services:
  - type: web
    name: aushadhi-360-api
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        scope: build
        sync: false
      - key: API_KEY
        scope: build
        sync: false
