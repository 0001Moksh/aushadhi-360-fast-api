services:
  - type: web
    name: aushadhi-360-api
    env: python
    region: oregon
    plan: free
    runtime: python-3.11.0
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1
    envVars:
      - key: DATABASE_URL
        scope: build
        sync: false
      - key: API_KEY
        scope: build
        sync: false
      - key: UVICORN_WORKERS
        value: "1"
      - key: SENTENCE_TRANSFORMERS_HOME
        value: "/tmp/st"
      - key: TRANSFORMERS_OFFLINE
        value: "0"
      - key: HF_HOME
        value: "/tmp/hf"
      - key: MALLOC_ARENA_MAX
        value: "1"
      - key: OMP_NUM_THREADS
        value: "1"
      - key: TOKENIZERS_PARALLELISM
        value: "false"
